name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main ]
  push:
    branches: ['*']  # optional: keep build feedback on branch pushes

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # === Step 3: Explicit "up-to-date with main" gate ===
  up_to_date:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fail if PR branch is behind base
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"
          MERGE_BASE="$(git merge-base "$HEAD_SHA" "$BASE_SHA")"

          echo "BASE_SHA=$BASE_SHA"
          echo "HEAD_SHA=$HEAD_SHA"
          echo "MERGE_BASE=$MERGE_BASE"

          if [ "$MERGE_BASE" != "$BASE_SHA" ]; then
            echo "Branch is behind base (main). Please rebase/merge main and resolve conflicts."
            exit 1
          fi
          echo "Branch contains latest base commit. Good to go."

  # === Step 2: Minimal required check (your build) ===
  build:
    runs-on: ubuntu-latest
    needs: [up_to_date]   # ensure gate runs first on PRs
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v3
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build project
        run: npm run build

      # Optional smoke check: starts server briefly and curls it
      - name: Start Next.js
        run: npm run start -- -p 3000 &
        env:
          NEXT_PUBLIC_TEST_ENV: true

      - name: Check if site is running
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:3000 >/dev/null; then
              echo "Site is up"; exit 0
            fi
            sleep 1
          done
          echo "Site did not start in time"; exit 1
